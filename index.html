<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LLMH MLG</title>

<style>
/* GORILLE */
.gorille-container {
  position: fixed;
  bottom: 10px;
  left: 10px;
  text-align: center;
  z-index: 10000;
}

.gorille-container img {
  width: 500px;
}

.gorille-text {
  color: white;
  font-size: 50px;
  font-family: Impact, Arial;
  margin-bottom: 5px;
}

/* BASE */
body {
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family:Impact, Arial;
}

/* TEXTE */
.title-container {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:9999;
  pointer-events:none;
  animation: spin 2s linear infinite;
}

h1 {
  font-size:200px;
  color:red;
  margin:0;
  animation: flash 0.2s infinite;
  text-shadow: 
    0 0 2px red,
    0 0 5px red,
    0 0 10px yellow;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* LOGOS */
img.logo {
  position:absolute;
  width:500px;
  z-index:1;
  animation: move 2s infinite alternate, rotate 1s linear infinite;
}

/* LASERS */
.laser {
  position:absolute;
  width:5px;
  height:200px;
  background:red;
  z-index:2;
  transform:rotate(45deg);
}

/* EXPLOSIONS */
.explosion {
  position:absolute;
  width:200px;
  z-index:3;
}

/* ANIM */
@keyframes spin {
  0% {transform:translate(-50%, -50%) rotate(0deg);}
  100% {transform:translate(-50%, -50%) rotate(360deg);}
}

@keyframes move {
  0% {top:0%; left:0%;}
  100% {top:80%; left:80%;}
}

@keyframes rotate {
  0% {transform:rotate(0deg);}
  100% {transform:rotate(360deg);}
}

@keyframes flash {
  0% {opacity:1;}
  50% {opacity:0;}
  100% {opacity:1;}
}
</style>
</head>

<body onclick="chaos()">

<!-- GORILLE -->
<div class="gorille-container">
  <div class="gorille-text">FUCK LMHL</div>
  <img src="gorille.png">
</div>

<!-- TEXTE -->
<div class="title-container">
  <h1>LLMH FOREVER</h1>
</div>

<!-- LOGOS -->
<img src="logo.png" class="logo">
<img src="logo.png" class="logo" style="top:70%;left:10%;">
<img src="logo.png" class="logo" style="top:10%;left:70%;">

<!-- SONS -->
<audio id="airhorn" src="mlg-airhorn.mp3"></audio>
<audio id="hit" src="hitmarker_2.mp3"></audio>
<audio id="mlg" src="mlg.mp3"></audio>

<script>

// ===== CHAOS GLOBAL =====
function chaos(){
  playSounds();
  spawnExplosion();
  spawnLaser();
  screenShake();
}

// ===== AUDIO FIX PC =====
function playSounds() {
  let airhorn = document.getElementById('airhorn');
  let hit = document.getElementById('hit');
  let mlg = document.getElementById('mlg');

  airhorn.volume = 1.0;
  mlg.volume = 1.0;

  // Déblocage audio (important PC)
  airhorn.muted = true;
  airhorn.play().then(() => {
    airhorn.pause();
    airhorn.muted = false;

    // AIRHORN
    airhorn.loop = true;
    airhorn.currentTime = 0;
    airhorn.play();

    // HIT EN RAFALE
    let hitInterval = setInterval(() => {
      let clone = hit.cloneNode();
      document.body.appendChild(clone);
      clone.play().then(()=> setTimeout(()=> clone.remove(), 500)).catch(()=>{});
    }, 120);

    // STOP après 10 sec
    setTimeout(() => {
      airhorn.pause();
      clearInterval(hitInterval);
    }, 10000);

    // SON MLG
    mlg.currentTime = 0;
    mlg.play();

  }).catch(err => {
    console.log("Audio bloqué:", err);
  });
}

// ===== FX =====
function spawnExplosion(){
  let boom = document.createElement("img");
  boom.src = "https://media.giphy.com/media/oe33xf3B50fsc/giphy.gif";
  boom.className = "explosion";
  boom.style.top = Math.random()*80 + "%";
  boom.style.left = Math.random()*80 + "%";
  document.body.appendChild(boom);
  setTimeout(()=>{boom.remove();},800);
}

function spawnLaser(){
  let laser = document.createElement("div");
  laser.className = "laser";
  laser.style.top = Math.random()*100 + "%";
  laser.style.left = Math.random()*100 + "%";
  document.body.appendChild(laser);
  setTimeout(()=>{laser.remove();},300);
}

function screenShake(){
  document.body.style.transform =
    "translate(" + (Math.random()*20-10) + "px," + (Math.random()*20-10) + "px)";
  setTimeout(()=>{document.body.style.transform = ""},100);
}

// CHAOS AUTO
setInterval(()=>{
  spawnExplosion();
  spawnLaser();
}, 500);

// ===== MOBILE TRIGGER =====
let cover = document.createElement('div');
cover.style.position = "fixed";
cover.style.top = "0";
cover.style.left = "0";
cover.style.width = "100%";
cover.style.height = "100%";
cover.style.zIndex = "9999";
document.body.appendChild(cover);

cover.addEventListener('click', () => {
  chaos();
  cover.remove();
}, {once:true});

</script>

</body>
</html>
