<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LLMH MLG</title>

<style>
/* GORILLE FIXE */
.gorille-container {
  position: fixed;
  bottom: 10px;
  left: 10px;
  text-align: center;
  z-index: 10000;
}

.gorille-container img {
  width: 120px;
}

.gorille-text {
  color: white;
  font-size: 20px;
  font-family: Impact, Arial;
  margin-bottom: 5px;
}
  
  body {
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family:Impact, Arial;
}

/* CONTENEUR TEXTE */
.title-container {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:9999;
  pointer-events:none;
  animation: spin 2s linear infinite;
}

h1 {
  font-size:200px;
  color:red;
  margin:0;
  animation: flash 0.2s infinite;
  text-shadow: 
    0 0 2px red,
    0 0 5px red,
    0 0 10px yellow;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* LOGOS */
img.logo {
  position:absolute;
  width:500px;
  z-index:1;
  animation: move 2s infinite alternate, rotate 1s linear infinite;
}

/* LASERS */
.laser {
  position:absolute;
  width:5px;
  height:200px;
  background:red;
  z-index:2;
  transform:rotate(45deg);
}

/* EXPLOSIONS */
.explosion {
  position:absolute;
  width:200px;
  z-index:3;
}

/* ANIMATIONS */
@keyframes spin {
  0% {transform:translate(-50%, -50%) rotate(0deg);}
  100% {transform:translate(-50%, -50%) rotate(360deg);}
}

@keyframes move {
  0% {top:0%; left:0%;}
  100% {top:80%; left:80%;}
}

@keyframes rotate {
  0% {transform:rotate(0deg);}
  100% {transform:rotate(360deg);}
}

@keyframes flash {
  0% {opacity:1;}
  50% {opacity:0;}
  100% {opacity:1;}
}
</style>
</head>

  <div class="gorille-container">
  <div class="gorille-text">FUCK LMHL</div>
  <img src="gorille.png" alt="gorille">
</div>
  
<body>

<div class="title-container">
  <h1>LLMH FOREVER</h1>
</div>

<img src="logo.png" class="logo">
<img src="logo.png" class="logo" style="top:70%;left:10%;">
<img src="logo.png" class="logo" style="top:10%;left:70%;">

<!-- SONS HÉBERGÉS -->
<audio id="airhorn" src="mlg-airhorn.mp3"></audio>
<audio id="wow" src="wow.mp3"></audio>
<audio id="hit" src="hitmarker_2.mp3"></audio>

<script>
// ======= FONCTIONS PRINCIPALES =======
function chaos(){
  playSounds();
  spawnExplosion();
  spawnLaser();
  screenShake();
}

function playSounds() {
  let airhorn = document.getElementById('airhorn');
  let wow = document.getElementById('wow');
  let hit = document.getElementById('hit');

  // ----- AIRHORN EN BOUCLE -----
  airhorn.loop = true; // active la boucle
  airhorn.play().catch(err => console.log("Erreur audio:", err));

  // ----- HITMARKER EN MODE 'PIOU PIOU' -----
  let hitInterval = setInterval(() => {
    let clone = hit.cloneNode(); // clone pour pouvoir superposer les sons
    document.body.appendChild(clone); // nécessaire pour que certains navigateurs jouent le son
    clone.play().then(()=> setTimeout(()=> clone.remove(), 1000)).catch(()=>{}); 
  }, 150); // toutes les 150ms => effet rafale

  // STOP HIT ET AIRHORN APRÈS 5 SECONDES (optionnel)
  setTimeout(() => {
    airhorn.pause();
    airhorn.currentTime = 0;
    clearInterval(hitInterval);
  }, 5000);
  
  // ----- WOW UNE FOIS -----
  wow.play().catch(()=>{});
}

function spawnExplosion(){
  let boom = document.createElement("img");
  boom.src = "https://media.giphy.com/media/oe33xf3B50fsc/giphy.gif";
  boom.className = "explosion";
  boom.style.top = Math.random()*80 + "%";
  boom.style.left = Math.random()*80 + "%";
  document.body.appendChild(boom);
  setTimeout(()=>{boom.remove();},800);
}

function spawnLaser(){
  let laser = document.createElement("div");
  laser.className = "laser";
  laser.style.top = Math.random()*100 + "%";
  laser.style.left = Math.random()*100 + "%";
  document.body.appendChild(laser);
  setTimeout(()=>{laser.remove();},300);
}

function screenShake(){
  document.body.style.transform = "translate(" + (Math.random()*20-10) + "px," + (Math.random()*20-10) + "px)";
  setTimeout(()=>{document.body.style.transform = ""},100);
}

// Chaos automatique (explosions + lasers)
setInterval(()=>{
  spawnExplosion();
  spawnLaser();
}, 500);

// ======= EFFET SURPRISE PC =======
window.onload = () => {
  if (!('ontouchstart' in window)) chaos(); // PC uniquement
};

// ======= EFFET SURPRISE MOBILE =======
let cover = document.createElement('div');
cover.style.position = "fixed";
cover.style.top = "0";
cover.style.left = "0";
cover.style.width = "100%";
cover.style.height = "100%";
cover.style.zIndex = "9999";
document.body.appendChild(cover);

cover.addEventListener('touchstart', () => {
    chaos();          // déclenche sons + explosions
    cover.remove();   // retire la couverture invisible
}, {once:true});
</script>

</body>
</html>
